<!DOCTYPE html>
<head>
<title>PC Build Configurator â€” Improved</title>
<style>
    :root{
        --bg:#f6f7fb;
        --card:#ffffff;
        --muted:#7d8590; 
        --accent:#6b3ad9; 
        --accent-2:#8f6bf0;
        --border:#e6e9ef;
        --shadow: 0 10px 30px rgba(107,58,217,0.08);
        --glass: rgba(255,255,255,0.6);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body {
        font-family: Inter, system-ui, -apple-system, Arial, sans-serif;
        background: linear-gradient(180deg,var(--bg), #eef0f7 60%);
        color: #0f1724;
        margin: 0;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        line-height:1.35;
    }
    header {
        text-align: center;
        padding: 26px 12px;
        background: linear-gradient(90deg,var(--card), #faf9ff);
        color: var(--accent);
        font-size: 26px;
        font-weight: 800;
        border-bottom: 1px solid var(--border);
        box-shadow: 0 6px 18px rgba(16,24,40,0.04);
        position: sticky;
        top: 0;
        z-index: 10;
    }
    .wrap{
        width: 94%;
        max-width: 1200px;
        margin: 28px auto 64px;
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 22px;
        align-items:start;
    }
    .card{
        background: var(--card);
        border-radius: 14px;
        padding: 20px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
    }
    .pc-preview {
    width: 100%;
    margin-top: 20px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

    .pc-preview img {
    width: 100%;
    display: block;
     }

    .section-title{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .section-title h2{margin:0;font-size:18px;color:var(--accent)}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
    select, input[type="number"]{
        width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:#fbfbfd;font-size:14px;outline:none;transition:box-shadow .15s ease;
    }
    select:focus, input[type="number"]:focus{box-shadow:0 6px 18px rgba(107,58,217,0.08)}
    .row{display:flex;gap:12px}
    .row > *{flex:1}
    .btn{
        display:inline-block;padding:10px 14px;border-radius:12px;border:none;font-weight:700;cursor:pointer
    }
    .btn-primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff}
    .btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
    .controls{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap}
    .label-row{display:flex;align-items:center;gap:12px;margin-top:14px}
    .label-row svg{width:28px;height:28px;opacity:0.95}
    #result{margin-top:18px;padding:14px;border-radius:12px;border:1px dashed var(--border);background:linear-gradient(180deg,#fff,#fbfbff)}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #f0f2f6;font-size:14px}
    .small{font-size:13px;color:var(--muted)}
    .parts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1/-1}
    .cart-list{max-height:360px;overflow:auto;margin-top:10px}
    .cart-item{display:flex;justify-content:space-between;gap:8px;padding:10px;border-radius:10px;background:linear-gradient(180deg,rgba(107,58,217,0.02),transparent);margin-bottom:8px}
    .cart-item .meta{font-size:13px;color:#111}
    .cart-item .meta .muted{color:var(--muted);font-weight:600;font-size:12px}
    .cart-footer{margin-top:12px;display:flex;justify-content:space-between;align-items:center}
    .badge{background:var(--accent);color:#fff;padding:6px 10px;border-radius:999px;font-weight:700}
    .muted-text{color:var(--muted)}
    .muted-bg{background:linear-gradient(180deg,#fafbff,#ffffff)}
    .control-block{display:flex;flex-direction:column}
    .hint{font-size:12px;color:var(--muted);margin-top:6px}
    @media (max-width:1000px){
        .wrap{grid-template-columns:1fr}
        .cart-panel{order:-1}
        .parts-grid{grid-template-columns:1fr}
    }
</style>
</head>
<body>
<header>BuildKartConfigí¶Ąď¸Ź</header>
<div class="wrap">
    <div class="card" aria-labelledby="configureTitle">
        <div class="section-title">
            <h2 id="configureTitle">Configure your parts</h2>
            <div style="flex:1"></div>
        </div>
        <div class="parts-grid">
            <div class="control-block">
                <label for="cpu">Choose CPU</label>
                <select id="cpu" aria-label="CPU select">
                    <option value="0">-- Select CPU --</option>
                    <option value="13000" data-name="Intel i3-14100F">Intel i3-14100F - Rs 13,000</option>
                    <option value="22500" data-name="Intel Core Ultra 5 245K">Intel Core Ultra 5 245K - Rs 22,500</option>
                    <option value="33000" data-name="Intel Core Ultra 7 265K">Intel Core Ultra 7 265K - Rs 33,000</option>
                    <option value="60000" data-name="Intel Core Ultra 9 285K">Intel Core Ultra 9 285K - Rs 60,000</option>
                    <option value="22000" data-name="AMD Ryzen 5 9600X">Ryzen 5 9600X - Rs 22,000</option>
                    <option value="31000" data-name="AMD Ryzen 7 9700X">Ryzen 7 9700X - Rs 31,000</option>
                    <option value="43000" data-name="AMD Ryzen 9 9900X">Ryzen 9 9900X - Rs 43,000</option>
                    <option value="47500" data-name="AMD Ryzen 9 9800X3D">Ryzen 7 9800X3D - Rs 47,500</option>
                </select>
            </div>
            <div class="control-block">
                <label for="mobo">Choose Motherboard</label>
                <select id="mobo">
                    <option value="0">-- Select Motherboard --</option>
                    <option value="18000" data-name="B860/B850">B860/B850 - Rs 18,000</option>
                    <option value="30000" data-name="Z890/X870">Z890/X870 - Rs 30,000</option>
                </select>
            </div>
            <div class="control-block">
                <label for="gpu">Choose GPU</label>
                <select id="gpu">
                    <option value="0">-- Select GPU --</option>
                    <option value="27000" data-name="RTX 5050">RTX 5050 - Rs 27,000</option>
                    <option value="38000" data-name="RTX 5060">RTX 5060 - Rs 38,000</option>
                    <option value="62000" data-name="RTX 5070">RTX 5070 - Rs 62,000</option>
                    <option value="142000" data-name="RTX 5080">RTX 5080 - Rs 1,42,000</option>
                    <option value="300000" data-name="RTX 5090">RTX 5090 - Rs 3,00,000</option>
                    <option value="40000" data-name="RX 9060 XT">RX 9060 XT - Rs 40,000</option>
                    <option value="55000" data-name="RX 9070">RX 9070 - Rs 55,000</option>
                    <option value="70000" data-name="RX 9070 XT">RX 9070 XT - Rs 70,000</option>
                </select>
            </div>
            <div class="control-block">
                <label for="ram">Choose RAM</label>
                <select id="ram">
                    <option value="0">-- Select RAM --</option>
                    <option value="8900" data-name="8GB DDR4">8GB DDR4 - Rs 8,900</option>
                    <option value="16200" data-name="16GB DDR5">16GB DDR5 - Rs 16,200</option>
                    <option value="40000" data-name="32GB DDR5">32GB DDR5 - Rs 40,000</option>
                    <option value="62000" data-name="64GB DDR5">64GB DDR5 - Rs 62,000</option>
                    <option value="112000" data-name="128GB DDR5">128GB DDR5 - Rs 1,12,000</option>
                </select>
            </div>
            <div class="control-block full">
                <label for="storage">Choose Storage</label>
                <select id="storage">
                    <option value="0">-- Select Storage --</option>
                    <option value="4200" data-name="256GB NVMe SSD">256GB NVMe SSD - Rs 4,200</option>
                    <option value="6000" data-name="512GB NVMe SSD">512GB NVMe SSD - Rs 6,000</option>
                    <option value="10000" data-name="1TB NVMe SSD">1TB NVMe SSD - Rs 10,000</option>
                    <option value="18000" data-name="2TB NVMe SSD">2TB NVMe SSD - Rs 18,000</option>
                </select>
            </div>
            <div class="control-block">
                <label for="cooler">Choose Cooler</label>
                <select id="cooler">
                    <option value="0">-- Select Cooler --</option>
                    <option value="5000" data-name="Air Cooler">Air Cooler - Rs 5,000</option>
                    <option value="12000" data-name="AIO Liquid Cooler">AIO Liquid Cooler - Rs 12,000</option>
                </select>
            </div>
            <div class="control-block">
                <label for="psu">Choose Power Supply (PSU)</label>
                <select id="psu">
                    <option value="0">-- Select PSU --</option>
                    <option value="5000" data-name="PSU 650W">PSU 650W - Rs 5,000</option>
                    <option value="7000" data-name="PSU 750W GOLD">PSU 750W GOLD - Rs 7,000</option>
                    <option value="9000" data-name="PSU 850W GOLD">PSU 850W GOLD - Rs 9,000</option>
                    <option value="12000" data-name="PSU 1000W GOLD">PSU 1000W GOLD - Rs 12,000</option>
                    <option value="16000" data-name="PSU 1200W PLATINUM">PSU 1200W PLATINUM - Rs 16,000</option>
                </select>
            </div>
            <div class="control-block full">
                <div class="controls">
                    <button class="btn btn-primary" onclick="calculate()">Calculate Total</button>
                    <button class="btn btn-outline" onclick="addToCartFromSelections()">Add to Cart</button>
                    <button class="btn" style="border:1px solid var(--border);" onclick="buyNowCurrent()">Buy Now</button>
                    <button class="btn" style="background:transparent;border:1px dashed var(--border);" onclick="resetSelections()">Reset</button>
                </div>
            </div>
            <div id="result" class="full" style="display:none">
                <p class="small">Total Price: <strong>Rs <span id="totalPrice">0</span></strong></p>
                <p class="small">Performance: <strong><span id="performance">Not calculated</span></strong></p>
            </div>
            <div id="compare" class="full" style="display:none">
                <h3 style="margin-top:8px;color:var(--accent)">Performance Comparison</h3>
                <table>
                    <tr><th>System Category</th><th>Score</th></tr>
                    <tr><td>Your Custom Build</td><td id="score">0</td></tr>
                    <tr><td>Office PC</td><td>30</td></tr>
                    <tr><td>Casual Gaming PC</td><td>60</td></tr>
                    <tr><td>Pro Gaming PC</td><td>100</td></tr>
                </table>
            </div>
        </div>
    </div>
    <aside class="card cart-panel" id="cartPanel" aria-labelledby="cartTitle">
        <div style="display:flex;align-items:center;gap:10px">
            <h2 id="cartTitle" style="margin:0;color:var(--accent)">Shopping Cart</h2>
            <div style="flex:1"></div>
            <div class="badge" id="cartCount">0</div>
        </div>
        <div class="cart-list" id="cartList">
            <p class="small">Your cart is empty.</p>
        </div>
        <div class="cart-footer">
            <div>
                <div class="small">Subtotal</div>
                <div style="font-weight:800;font-size:18px">Rs <span id="cartTotal">0</span></div>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px">
                <button class="btn btn-primary" onclick="proceedToCheckout()">Checkout</button>
                <button class="btn btn-outline" onclick="clearCart()">Clear Cart</button>
            </div>
        </div>
            <div class="pc-preview">
    <img src="pc.jpg" alt="PC Preview">
    </aside>
</div>
</div>
</div>
<script>
    const cart = [];
    function formatPrice(n){
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
    function getSelectedOption(selectId){
        const sel = document.getElementById(selectId);
        if(!sel) return null;
        const idx = sel.selectedIndex;
        if(idx<=0) return null;
        const option = sel.options[idx];
        return { price: Number(option.value)||0, name: option.dataset.name || option.text };
    }
    function calculate(){
        const ids = ['cpu','mobo','gpu','ram','storage','cooler','psu'];
        const parts = ids.map(getSelectedOption);
        const total = parts.reduce((s,p)=> s + (p? p.price : 0), 0);
        document.getElementById('totalPrice').innerText = formatPrice(total);
        document.getElementById('result').style.display = 'block';
        const cpu = getSelectedOption('cpu')?.price || 0;
        const gpu = getSelectedOption('gpu')?.price || 0;
        const others = total - cpu - gpu;
        let rawScore = Math.round((cpu * 0.45 + gpu * 0.45 + others * 0.1) / 1500);
        rawScore = Math.max(10, Math.min(100, rawScore));
        let performance = 'Low End / Office';
        if(rawScore > 80) performance = 'Ultra Gaming Beast';
        else if(rawScore > 60) performance = 'High End Gaming';
        else if(rawScore > 40) performance = 'Mid Range Gaming';
        else performance = 'Low End / Office';
        document.getElementById('performance').innerText = performance;
        document.getElementById('score').innerText = rawScore;
        document.getElementById('compare').style.display = 'block';
        return { parts, total: total, score: rawScore };
    }
    function addToCartFromSelections(){
        const res = calculate();
        const chosen = res.parts.map(p=> p ? p.name : null).filter(Boolean).join(' + ') || 'Custom Build (no parts selected)';
        const item = { id: Date.now(), title: chosen, price: res.total, qty: 1 };
        cart.push(item);
        renderCart();
        alert('Added to cart: ' + chosen + ' â€” Rs ' + formatPrice(res.total));
    }
    function renderCart(){
        const list = document.getElementById('cartList');
        list.innerHTML = '';
        if(cart.length===0){
            list.innerHTML = '<p class="small">Your cart is empty.</p>';
        } else {
            cart.forEach(it=>{
                const node = document.createElement('div');
                node.className = 'cart-item';
                node.innerHTML = `
                    <div class="meta">
                        <div style="font-weight:700">${escapeHtml(it.title)}</div>
                        <div class="muted" style="margin-top:6px">Qty: <input type="number" min="1" value="${it.qty}" style="width:70px" onchange="updateQty(${it.id},this.value)"></div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:800">Rs ${formatPrice(it.price)}</div>
                        <div style="margin-top:8px"><button class="btn" style="font-size:12px;padding:6px;border:1px solid var(--border);" onclick="removeFromCart(${it.id})">Remove</button></div>
                    </div>`;
                list.appendChild(node);
            });
        }
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('cartTotal').innerText = formatPrice(cart.reduce((s,i)=> s + (i.price * i.qty), 0));
    }
    function updateQty(id, val){
        const it = cart.find(x=> x.id==id);
        if(!it) return;
        it.qty = Math.max(1, parseInt(val)||1);
        renderCart();
    }
    function removeFromCart(id){
        const idx = cart.findIndex(x=> x.id==id);
        if(idx!==-1) cart.splice(idx,1);
        renderCart();
    }
    function clearCart(){
        if(!confirm('Clear all items from cart?')) return;
        cart.length = 0; renderCart();
    }
    function proceedToCheckout(){
        const total = cart.reduce((s,i)=> s + (i.price * i.qty), 0);
        if(total===0){ alert('Your cart is empty. Add items before checkout.'); return; }
        alert('Proceeding to checkout. Total: Rs ' + formatPrice(total) + '.\n(Order Confirmed-Thank you for shopping!)');
    }
    function buyNowCurrent(){
        const res = calculate();
        if(res.total === 0){ alert('Nothing selected to buy. Please choose parts first.'); return; }
        if(confirm('Buy this build now for Rs ' + formatPrice(res.total) + '?')){
            alert('Thank you! Your order for Rs ' + formatPrice(res.total) + ' has been placed.');
        }
    }
    function resetSelections(){
        ['cpu','mobo','gpu','ram','storage','cooler','psu'].forEach(id=>{ const el=document.getElementById(id); if(el) el.selectedIndex = 0; });
        document.getElementById('result').style.display = 'none';
        document.getElementById('compare').style.display = 'none';
    }
    function escapeHtml(text){
        return String(text).replace(/[&<>"']/g, function(c){ return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;" }[c]; });
    }
    renderCart();
</script>
</body>
</html>
